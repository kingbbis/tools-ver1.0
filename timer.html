<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .timer-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .time-display {
            font-size: 48px;
            margin: 20px 0;
            font-weight: bold;
        }
        .inputs {
            margin: 20px 0;
        }
        .inputs input {
            width: 60px;
            padding: 5px;
            margin: 0 5px;
            text-align: center;
        }
        .buttons {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #start { background-color: #4CAF50; color: white; }
        #pause { background-color: #ff9800; color: white; }
        #stop { background-color: #f44336; color: white; }
        #reset { background-color: #2196F3; color: white; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .back-home {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 999;
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            background-color: #2196F3;
            color: white;
            cursor: pointer;
        }
        .back-home:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>
    <button class="back-home" onclick="window.location.href='index.html'">Back to Home</button>
    <div class="timer-container">
        <h1>Timer</h1>
        <div class="inputs">
            <input type="number" id="hours" min="0" max="23" value="0" placeholder="H">
            <input type="number" id="minutes" min="0" max="59" value="0" placeholder="M">
            <input type="number" id="seconds" min="0" max="59" value="0" placeholder="S">
        </div>
        <div class="time-display" id="display">00:00:00</div>
        <div class="buttons">
            <button id="start">Start</button>
            <button id="pause" disabled>Pause</button>
            <button id="stop" disabled>Stop</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        let interval;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let isRunning = false;
        let isPaused = false;

        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const display = document.getElementById('display');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const stopBtn = document.getElementById('stop');
        const resetBtn = document.getElementById('reset');

        function updateTotalSeconds() {
            const h = parseInt(hoursInput.value) || 0;
            const m = parseInt(minutesInput.value) || 0;
            const s = parseInt(secondsInput.value) || 0;
            totalSeconds = h * 3600 + m * 60 + s;
            remainingSeconds = totalSeconds;
            startBtn.disabled = totalSeconds === 0;
            updateDisplay();
        }

        function updateDisplay() {
            const h = Math.floor(remainingSeconds / 3600);
            const m = Math.floor((remainingSeconds % 3600) / 60);
            const s = remainingSeconds % 60;
            display.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning && !isPaused) return;
            if (remainingSeconds <= 0) return;
            isRunning = true;
            isPaused = false;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            interval = setInterval(() => {
                remainingSeconds--;
                updateDisplay();
                if (remainingSeconds <= 0) {
                    clearInterval(interval);
                    isRunning = false;
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    stopBtn.disabled = true;
                    alert('Time\'s up!');
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(interval);
            isPaused = true;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        function stopTimer() {
            clearInterval(interval);
            isRunning = false;
            isPaused = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
        }

        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            isPaused = false;
            updateTotalSeconds();
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
        }

        hoursInput.addEventListener('input', updateTotalSeconds);
        minutesInput.addEventListener('input', updateTotalSeconds);
        secondsInput.addEventListener('input', updateTotalSeconds);

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        stopBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Initial setup
        updateTotalSeconds();
    </script>
</body>
</html>
